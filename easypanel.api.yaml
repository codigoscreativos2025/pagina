# EasyPanel Configuration - API Backend
# Tipo: Node.js
# Puerto: 3001
name: agents-api
logo: ""

# Build de Node.js desde la carpeta api/
build:
  framework: node
  root: api
  command: npm install
  output: .

# Start del servidor
start:
  command: npm start
  socket: false

# Puerto donde corre la API
port: 3001

# Solo proxy, sin SSL externo (interno)
features:
  - proxy
