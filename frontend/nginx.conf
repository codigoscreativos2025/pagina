server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # EasyPanel Healthcheck
    location /health {
        access_log off;
        return 200 'OK';
    }

    # SPA routing - todo lo que no sea archivo va a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Archivos estáticos del build
    location /static/ {
        expires 1y;
        add_header Cache-Control: public;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control: public;
    }
}
